run:
  id: smoke_1q_scalar
  seed: 7
data:
  data_root: data/raw
  dataset: smoke_readme_pipeline
split:
  train: 0.50
  val: 0.25
  test: 0.25
features:
  feature_set: scalar
  scalar_mode: logS_plus_c_eta
  scalar_c: 1.0
  smooth_sigma: 0.6
model:
  type: qnn1
  L: 2
  encoding: ryrz
normalizer:
  enabled: true
  clip: 3.0
  angles: true
train:
  epochs: 12
  patience: 4
  batch_size: 64
  lr: 0.01
  monitor: val_pr_auc
outputs:
  plots: true
