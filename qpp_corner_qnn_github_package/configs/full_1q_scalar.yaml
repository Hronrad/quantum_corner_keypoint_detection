run:
  id: full_1q_scalar
  seed: 11
data:
  data_root: data/raw
  dataset: synthetic_keypoints
split:
  train: 0.70
  val: 0.15
  test: 0.15
features:
  feature_set: scalar
  scalar_mode: logS_plus_c_eta
  scalar_c: 1.0
  smooth_sigma: 0.6
model:
  type: qnn1
  L: 3
  encoding: ryrz
normalizer:
  enabled: true
  clip: 3.0
  angles: true
train:
  epochs: 100
  patience: 12
  batch_size: 128
  lr: 0.003
  monitor: val_pr_auc
outputs:
  plots: true
