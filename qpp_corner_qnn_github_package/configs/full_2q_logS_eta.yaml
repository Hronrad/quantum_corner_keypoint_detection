run:
  id: full_2q_logS_eta
  seed: 11
data:
  data_root: data/raw
  dataset: synthetic_keypoints
split:
  train: 0.70
  val: 0.15
  test: 0.15
features:
  feature_set: logS_eta
  smooth_sigma: 0.6
model:
  type: qnn2
  L: 3
  encoding: ryrz
  entanglement: linear_01
  readout: z_z_zz
normalizer:
  enabled: true
  clip: 3.0
  angles: true
train:
  epochs: 100
  patience: 12
  batch_size: 128
  lr: 0.003
  monitor: val_pr_auc
outputs:
  plots: true
